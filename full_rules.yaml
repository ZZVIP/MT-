  - pattern: "哈利波特5"
    bind: { tmdb: 675, media: movie }
  - pattern: "Harry\\.Potter\\.VI"
    bind: { tmdb: 767, media: movie }
  - pattern: "哈利波特6"
    bind: { tmdb: 767, media: movie }
  - pattern: "Harry\\.Potter\\.and\\.the\\.Deathly\\.Hallows.* Part\\.1"
    bind: { tmdb: 12444, media: movie }
