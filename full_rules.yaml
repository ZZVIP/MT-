# ==================== 正则替换 (mr) ====================
mr:
  # --- 容易误识别的年份标题 TMDB绑定 ---
  - pattern: "^1923"
    bind: { tmdb: 157744, media: tv }
  - pattern: "^1883"
    bind: { tmdb: 118357, media: tv }
  - pattern: "^1942"
    bind: { tmdb: 130063, media: tv }
  - pattern: "^1992.*?2015"
    bind: { tmdb: 62459, media: tv }
  - pattern: "^2012\\."
    replace: "二零一二."
  - pattern: "^1917\\."
    replace: "一九一七."
  - pattern: "^2046\\."
    bind: { tmdb: 844, media: movie }
  # 喀什恋歌  
  - pattern: Bloom Life
    bind: { tmdb: 289708, media: tv }

  # --- 数字开头容易混淆的标题 ---
  - pattern: "^12\\.Monkeys"
    replace: "十二猴子."
  - pattern: "11\\.Rebels"
    bind: { tmdb: 1310682, media: movie }
  - pattern: "119\\.Emergency\\.Call\\."
    replace: "119紧急呼叫."
  - pattern: "101\\.Marriages"
    replace: "101次抢婚"

  # --- 特殊标题 TMDB绑定 ---
  - pattern: "Madame\\.Web"
    bind: { tmdb: 634492, media: movie }
  - pattern: "F1：狂飙飞车"
    bind: { tmdb: 911430, media: movie }
  - pattern: "Move to Heaven：我是遗物整理师"
    bind: { tmdb: 96571, media: tv }
  - pattern: "ONE：高中英雄们"
    bind: { tmdb: 233219, media: tv }
  - pattern: "Perfect World"
    bind: { tmdb: 124003, media: tv }
  - pattern: "成何体统 \\(2024\\)"
    bind: { tmdb: 256783, media: tv }
  - pattern: "成何体统 \\(2026\\)"
    bind: { tmdb: 280632, media: tv }
  - pattern: "Mother.*2009"
    bind: { tmdb: 30018, media: movie }
  - pattern: "Resurrection.*2025"
    bind: { tmdb: 878608, media: movie }
  - pattern: "超时空要塞\\sFrontier"
    bind: { tmdb: 5857, media: tv }
  - pattern: "正义使者\\s*-\\s*我的英雄学院之非法英雄"
    bind: { tmdb: 280110, media: tv }
  - pattern: "Jae[-. _]?seok['’]?[. _-]?s[. _-]+B[. _-]*(?:and|&)[. _-]*B[. _-]+Rules"
    bind: { tmdb: 318167, media: tv }


  # --- 少女与战车 最终章系列 ---
  - pattern: "少女与战车 最终章 ～第1话～"
    bind: { tmdb: 474659, media: movie }
  - pattern: "少女与战车 最终章 ～第2话～"
    bind: { tmdb: 496891, media: movie }
  - pattern: "少女与战车 最终章 ～第3话～"
    bind: { tmdb: 746880, media: movie }
  - pattern: "少女与战车 最终章 ～第4话～"
    bind: { tmdb: 1051192, media: movie }

  # --- 教父系列 ---
  - pattern: "教父\\.1\\."
    bind: { tmdb: 238, media: movie }
