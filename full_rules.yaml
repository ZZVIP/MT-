  # --- 国漫 ---
  - pattern: "斗破苍宆"
    bind: { tmdb: 79481, media: tv }
    

  # --- 日漫长篇集数绑定 ---
  - pattern: "樱桃小丸子第二期.*?\\[(\\d{4})\\]"
    bind: { tmdb: 57775, media: tv, season: 2, episode: "$1" }
  - pattern: "Chibi Maruko-chan II.*?\\[(\\d+)\\]"
    bind: { tmdb: 57775, media: tv, season: 2, episode: "$1" }
  - pattern: "NewDoraemon哆啦A梦新番\\[(\\d+)\\]"
    bind: { tmdb: 65733, media: tv, season: 1, episode: "$1" }

  # --- 宇宙啦啦队tmdbid绑定 ---
  - pattern: "(?i)宇宙啦啦队.*S(\\d+)"
    bind:
      tmdb: 316099
      media: tv
      season: 1  
 
  # --- 波吉亚家族tmdbid绑定 ---
  - pattern: 波吉亚家族
    bind:
      tmdb: 33025
      media: tv

  # --- 陌生人：第三章tmdbid绑定 ---
  - pattern: 陌生人：第三章
    bind:
      tmdb: 1010755
      media: movie

  # 一叠间漫画咖啡屋生活！
  - pattern: Ichijouma Mankitsugurashi
    bind:
      tmdb: 295751
      media: tv
  
  - pattern: 聊斋志异之孽欲孤魂
    bind:
      tmdb: 129171
      media: movie
  
  - pattern: 聊斋艳谭之欲焰三娘子
    bind:
      tmdb: 146312
      media: movie

  - pattern: 沧元图
    bind:
      tmdb: 229192
      media: tv

      
      
  # --- 新网球王子 U-17 世界杯 半决赛篇tmdbid绑定 ---
  - pattern: (?i)新网球王子 U-17 世界杯 半决赛篇
    bind:
      tmdb: 205493
      media: tv
      season: 2
      episode: $1
  # --- 熊出没之熊熊乐园 ---
  - pattern: (?i)熊熊乐园
    bind:
      tmdb: 106223
      media: tv
      episode: $1 
  # --- 稚爱目击 ---      
  - pattern: "(?i)The.Witness.*S(\\d+)*E(\\d+).2160p.NF.WEB-DL.DDP5.1.Atmos.DV.H.265-HiveWeb"
    bind:
      tmdb: 280511
      media: tv
      episode: $1
  - pattern: "(?i)The.Witness.*S(\\d+)*E(\\d+).2160p.NF.WEB-DL.DDP5.1.Atmos.HDR.H.265-HiveWeb"
    bind:
      tmdb: 280511
      media: tv
      episode: $1   
  - pattern: "(?i)Dexter.Resurrection.*S(\\\\d+)*E(\\\\d+)"
    bind:
      tmdb: 259909
      media: tv
      episode: $1    
  
      
  # --- 正则替换 ---
  - pattern: Blu-rayRemux
    replace: Blu-ray.Remux
  - pattern: "(?i)\\b·\\b"
    replace: .
  
  # --- 无效发布组标签清理 ---
  - pattern: "-SC(?=[\\W_]|$)"
    action: remove
  - pattern: "-SCDIY(?=[\\W_]|$)"
    action: remove
  - pattern: "-WF(?=[\\W_]|$)"
    action: remove
  - pattern: "-404(?=[\\W_]|$)"
    action: remove
  - pattern: "Ftang"
    action: remove

  # --- 特殊格式文件名清理 ---
  - pattern: "^\\[\\d{4}]\\[(?:中国|大陆|台湾|香港|美国|英国|法国|德国|意大利|西班牙|俄罗斯|日本|韩国|印度|泰国|越南|澳大利亚|加拿大|新西兰|墨西哥|巴西|阿根廷|土耳其|捷克|匈牙利|波兰|瑞典|挪威|丹麦|芬兰)].*?\\[.*?GB](.*?)(LGNB)"
    replace: "$1$2"
  - pattern: "中配"
    action: remove
  - pattern: "日配"
    action: remove

